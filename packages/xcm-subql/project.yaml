specVersion: 1.0.0
name: acala-xcm
repository: 'https://github.com/AcalaNetwork/acala-subql-services'
version: 1.0.0
runner:
  node:
    name: "@subql/node"
    version: "6.4.6"
  query:
    name: "@subql/query"
    version: "2.25.0"
schema:
    file: ./schema.graphql
network:
  chainId: "0xfc41b9bd8ef8fe53d58c7ea67c794c7ec9a73daf05e6d54b14ff6342c99ba64c"
  endpoint: wss://acala-rpc.aca-api.network
  chaintypes:
    file: './dist/chain-types.js'
dataSources:
  - kind: substrate/Runtime
    startBlock: 5502000
    mapping:
      file: "./dist/index.js"
      handlers:
        - handler: handleXCMOut
          kind: substrate/EventHandler
          filter:
            module: xTokens
            method: TransferredAssets
        - handler: handleXCMOut
          kind: substrate/EventHandler
          filter:
            module: xTokens
            method: TransferredMultiAssets
        - handler: handleXCMIn
          kind: substrate/EventHandler
          filter:
            module: messageQueue
            method: Processed
